spring:
  application:
    name: app

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
        ddl-auto: create-drop
    show-sql: false
    properties:
        hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
            format_sql: true

  mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        default-encoding: UTF-8
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true
                    ssl:
                        trust: ${MAIL_HOST:smtp.gmail.com}
                        protocols: TLSv1.2
                    connectiontimeout: ${MAIL_CONNECTION_TIMEOUT}
                    timeout: ${MAIL_TIMEOUT}
                    writetimeout: ${MAIL_WRITE_TIMEOUT}

app:
  url: ${APP_URL:http://localhost:8080}
  security:
    jwt:
      access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:86400000} #24 hours for local testing #900000 # 15 minutes
      refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800000} # 7 days